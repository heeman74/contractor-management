# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# does not affect the "revision_date" variable in any way.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# regardless if autogenerate or not.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without corresponding .py files
# to trigger the revision process.
# sourceless = false

# Version path separator — the character used to separate the source and
# revision ids in the version path of a multi-branching scenario.
# version_path_separator = os  # default: use os.pathsep

# Set to 'true' to search source files recursively in each "version_locations"
# directory; an alternative to placing multiple "version_locations" entries.
# recursive_version_locations = false

# The output encoding used when revision files are written from
# script.py.mako; defaults to utf-8.
# output_encoding = utf-8

# NOTE: sqlalchemy.url is overridden in migrations/env.py via DATABASE_URL env var
# Placeholder — the real URL comes from DATABASE_URL environment variable
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@localhost:5432/contractorhub


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "ruff" - use the latest installed version
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix FILEPATH

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
