name: contractorhub
description: "ContractorHub - Multi-company SaaS platform for contractor management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  go_router: ^17.1.0
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  uuid: ^4.0.0
  path_provider: ^2.1.0
  connectivity_plus: ^7.0.0
  internet_connection_checker_plus: ^2.9.1
  dio_smart_retry: ^7.0.1
  workmanager: ^0.9.0
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.1.2
  patterns_canvas: ^0.5.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  build_runner: ^2.4.0
  drift_dev: ^2.32.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
